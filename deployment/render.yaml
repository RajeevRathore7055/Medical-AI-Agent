services:
  - type: web
    name: medical-agent-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_TYPE
        value: postgresql
      - key: POSTGRES_URL
        fromDatabase:
          name: medical-db
          property: connectionString
      - key: LLM_MODEL
        value: google/flan-t5-base
      - key: WHISPER_MODEL
        value: base

databases:
  - name: medical-db
    databaseName: medical_db
    plan: free
